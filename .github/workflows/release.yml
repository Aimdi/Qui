name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true
      - name: Build
        run: |
          python -m venv .venv && source .venv/bin/activate
          pip install -r requirements.txt && python generate_icons.py && deactivate
          flutter config --enable-linux-desktop --no-analytics
          flutter pub get
          dart run dart_pubspec_licenses:generate
          dart run intl_utils:generate
          dart run flutter_iconpicker:generate_packs --packs material
          flutter build linux --release --no-tree-shake-icons
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/qui-linux-x64.tar.gz" .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: qui-linux-x64.tar.gz
