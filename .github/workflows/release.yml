name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Leave empty to use the run ref.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev mpv libayatana-appindicator3-dev \
            zstd libarchive-tools

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Generate + build Linux release
        run: |
          flutter config --enable-linux-desktop --no-analytics
          flutter pub get
          dart run dart_pubspec_licenses:generate
          dart run intl_utils:generate
          dart run flutter_iconpicker:generate_packs --packs material || true
          flutter build linux --release --no-tree-shake-icons

      - name: Package portable tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf "dist/qui-${VERSION}-linux-x64.tar.gz" .
          ls -lah dist/

      - name: Build Arch / CachyOS .pkg.tar.zst
        run: |
          set -euo pipefail
          VERSION="${VERSION}"
          PKG="qui-${VERSION}-1-x86_64.pkg.tar.zst"
          ROOT="$PWD"
          BUNDLE="$ROOT/build/linux/x64/release/bundle"
          DATA=$(mktemp -d)

          # File tree as it will live on the system
          install -d "$DATA/opt/qui"
          cp -a "$BUNDLE/." "$DATA/opt/qui/"
          chmod 755 "$DATA/opt/qui/qui"

          install -Dm755 "$ROOT/packaging/qui-launcher" "$DATA/usr/bin/qui"
          install -Dm644 "$ROOT/packaging/io.github.aimdi.Qui.desktop" \
            "$DATA/usr/share/applications/io.github.aimdi.Qui.desktop"
          if [ -f "$ROOT/packaging/io.github.aimdi.Qui.svg" ]; then
            install -Dm644 "$ROOT/packaging/io.github.aimdi.Qui.svg" \
              "$DATA/usr/share/icons/hicolor/scalable/apps/io.github.aimdi.Qui.svg"
          fi
          if [ -f "$ROOT/packaging/io.github.aimdi.Qui.png" ]; then
            install -Dm644 "$ROOT/packaging/io.github.aimdi.Qui.png" \
              "$DATA/usr/share/icons/hicolor/256x256/apps/io.github.aimdi.Qui.png"
          fi
          install -Dm644 "$ROOT/LICENSE" "$DATA/usr/share/licenses/qui/LICENSE"

          # Size in KiB (Arch convention)
          SIZE=$(du -sk "$DATA" | cut -f1)

          # An Arch package is a single zstd-compressed tar whose members are
          # .PKGINFO (first), .MTREE, and the file tree at the root — NOT a
          # nested data.tar.zst (that's the Debian layout, which pacman installs
          # as a stray file and drops the real binaries). Write .PKGINFO into the
          # package root next to opt/ and usr/.
          cat > "$DATA/.PKGINFO" <<EOF
          # Generated by Qui release workflow
          pkgname = qui
          pkgbase = qui
          pkgver = ${VERSION}-1
          pkgdesc = Privacy-focused X (Twitter) client for Linux desktop (Flutter; based on QuaX-fix)
          url = https://github.com/Aimdi/Qui
          builddate = $(date +%s)
          packager = GitHub Actions <actions@github.com>
          size = $((SIZE * 1024))
          arch = x86_64
          license = MIT
          depend = gtk3
          depend = glib2
          depend = mpv
          depend = xz
          depend = hicolor-icon-theme
          EOF
          # Strip leading spaces from heredoc if any
          sed -i 's/^[[:space:]]*//' "$DATA/.PKGINFO"

          # .MTREE manifest, root-owned so `pacman -Qkk` reports no UID/GID drift.
          ( cd "$DATA" && LANG=C bsdtar -czf .MTREE --format=mtree \
              --uid 0 --gid 0 --uname root --gname root \
              --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
              .PKGINFO opt usr )

          # Final package: flat, root-owned, .PKGINFO first — exactly what
          # makepkg produces and what `pacman -U` expects.
          ( cd "$DATA" && LANG=C bsdtar --format=gnutar \
              --uid 0 --gid 0 --uname root --gname root \
              -cf - .PKGINFO .MTREE opt usr ) | zstd -19 > "$ROOT/dist/$PKG"

          ls -lah "$ROOT/dist/"
          file "$ROOT/dist/$PKG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          name: Qui ${{ env.VERSION }}
          generate_release_notes: true
          body: |
            ## Qui ${{ env.VERSION }} — desktop (Linux)

            Privacy-focused X client for PC (port of [QuaX-fix](https://github.com/Aimdi/QuaX-fix)), with a Flare-inspired shell and **deck mode**.

            ### CachyOS / Arch install

            Download **`qui-${{ env.VERSION }}-1-x86_64.pkg.tar.zst`**, then:

            ```bash
            sudo pacman -U qui-${{ env.VERSION }}-1-x86_64.pkg.tar.zst
            qui
            ```

            Dependencies: `gtk3`, `glib2`, `mpv`, `xz`.

            ### Portable tarball

            ```bash
            tar -xzf qui-${{ env.VERSION }}-linux-x64.tar.gz
            ./qui
            ```

            ### Notes

            - First release — expect rough edges (especially deck mode).
            - Desktop login: paste `auth_token` + `ct0` cookies from the browser.
          files: |
            dist/*.pkg.tar.zst
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
